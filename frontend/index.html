<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CVD AI Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #chat-container { width: 400px; height: 500px; background: white; border-radius: 10px; display: flex; flex-direction: column; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        #chat-window { flex: 1; padding: 20px; overflow-y: auto; border-bottom: 1px solid #ddd; }
        .message { margin-bottom: 15px; padding: 10px; border-radius: 8px; max-width: 80%; }
        .bot { background: #e1f5fe; align-self: flex-start; }
        .user { background: #007bff; color: white; margin-left: auto; }
        #input-area { padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; }
        .mode-toggle { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 10px; background: #eee; font-size: 12px; }
        .switch { position: relative; display: inline-block; width: 34px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #e74c3c; }
        input:checked + .slider:before { transform: translateX(14px); }
    </style>
</head>
<body>
    <div class="main-wrapper" style="display: flex; gap: 20px; align-items: flex-start; justify-content: center; padding: 20px;">
        
        <div id="chat-container">
            <div class="chat-header">
                <h2 style="margin: 10px 0; text-align: center;">CVD AI Assistant</h2>
                <div class="mode-toggle">
                    <span>Patient</span>
                    <label class="switch">
                        <input type="checkbox" id="mode-checkbox">
                        <span class="slider round"></span>
                    </label>
                    <span>Doctor</span>
                </div>
            </div>
            <div id="chat-window">
                <div class="message bot">Welcome! I am set to Patient Mode. Please enter your age.</div>
            </div>
            <div id="input-area">
                <input type="text" id="user-input" placeholder="Type here...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <div id="history-sidebar" style="width: 320px; background: white; border-radius: 10px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); height: 500px; display: flex; flex-direction: column;">
            <h3 style="margin-top: 0; color: #333; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; text-align: center;">Session History</h3>
            <div style="flex: 1; overflow-y: auto;">
                <table id="history-table" style="width: 100%; font-size: 13px; border-collapse: collapse;">
                    <thead>
                        <tr style="text-align: left; border-bottom: 2px solid #ddd;">
                            <th style="padding: 8px;">Mode</th>
                            <th style="padding: 8px;">BP</th>
                            <th style="padding: 8px;">Risk</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
